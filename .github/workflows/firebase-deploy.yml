name: Deploy to Firebase Hosting and Sync Studio

on:
  push:
    branches:
      - main  # cambiá esto si usás otra rama
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Compilar proyecto (si usás Next.js o build necesario)
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          POLYGON_PRIVATE_KEY: ${{ secrets.POLYGON_PRIVATE_KEY }}
          POLYGON_PROVIDER_URL: ${{ secrets.POLYGON_PROVIDER_URL }}
          POLYGON_WALLET_ADDRESS: ${{ secrets.POLYGON_WALLET_ADDRESS }}
          FIREBASE_SENDEMAIL_URL: ${{ secrets.FIREBASE_SENDEMAIL_URL }}
          ADMIN_PANEL_EMAIL: ${{ secrets.ADMIN_PANEL_EMAIL }}
          ADMIN_PANEL_PASSWORD: ${{ secrets.ADMIN_PANEL_PASSWORD }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}

      - name: 🔄 Notify Firebase Studio Local
        run: |
          echo "🚀 Notificando Firebase Studio local..."
          curl -X POST "http://localhost:3001/webhook" \
            -H "Content-Type: application/json" \
            -d '{
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "message": "Auto-sync from GitHub push",
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "pusher": "${{ github.actor }}"
            }' || echo "⚠️ Firebase Studio no está ejecutándose localmente"

      - name: ✅ Deployment Complete
        run: |
          echo ""
          echo "🎉 ¡Deployment completado exitosamente!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📱 Firebase Hosting: ✅ Actualizado"
          echo "💻 Firebase Studio: 🔄 Notificación enviada"
          echo "🔗 Revisa tu Firebase Studio local para ver los cambios"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
