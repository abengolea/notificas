# Firebase App Hosting - Notificas
# Las credenciales sensibles usan Cloud Secret Manager (NO hardcodear)
# Configurar con: ./setup-firebase-secrets.sh
#
# CRÍTICO: NEXT_PUBLIC_* debe existir en BUILD y RUNTIME. Si solo van en runConfig.env,
# next build las deja vacías y SSR rompe en producción (login, etc.).
# Ver: https://firebase.google.com/docs/app-hosting/configure#set-variable-availability
#
# CRÍTICO para firebase-admin: secretos FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL,
# FIREBASE_PRIVATE_KEY desde la service account.

runtime: nodejs22

runConfig:
  maxInstances: 1

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    secret: FIREBASE_MEASUREMENT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: POLYGON_PRIVATE_KEY
    secret: POLYGON_PRIVATE_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: POLYGON_PROVIDER_URL
    value: "https://polygon-bor-rpc.publicnode.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: POLYGON_WALLET_ADDRESS
    secret: POLYGON_WALLET_ADDRESS
    availability:
      - BUILD
      - RUNTIME
  - variable: POLYGON_CERTIFY_SECRET
    secret: POLYGON_CERTIFY_SECRET
    availability:
      - BUILD
      - RUNTIME
